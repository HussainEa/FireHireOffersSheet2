<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="https://i.ibb.co/5Xh4xx8Y/IMG-20251012-WA0004.jpg" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireHire | Job Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #ff3b3b; }
        body { font-family: 'Cairo', sans-serif; transition: 0.4s; position: relative; min-height: 100vh; }
        
        /* لوجو الشركة في الخلفية */
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60%; height: 60%; background: url('https://i.ibb.co/5Xh4xx8Y/IMG-20251012-WA0004.jpg') no-repeat center;
            background-size: contain; opacity: 0.05; z-index: -1; filter: grayscale(100%);
        }

        body.dark { background-color: #0a0a0a; color: white; }
        body.light { background-color: #f3f4f6; color: #1f2937; }
        
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-radius: 20px; }
        body.light .glass { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.05); }
        
        .apply-btn {
            background: linear-gradient(135deg, #ff3b3b 0%, #ff6b2b 100%);
            border-bottom: 5px solid #b32929;
            transition: all 0.2s ease;
            box-shadow: 0 10px 15px -3px rgba(255, 59, 59, 0.3);
            border-radius: 15px;
            cursor: pointer;
        }
        .apply-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        
        .detail-item { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 10px; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        body.light .detail-item { background: rgba(0,0,0,0.03); color: #4b5563; }
    </style>
</head>
<body class="dark" id="bodyTag">

<header class="p-6 text-center bg-[#ff3b3b] shadow-2xl sticky top-0 z-[100]">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <div class="text-right">
            <h1 class="text-2xl font-black italic text-white">🔥 FIREHIRE</h1>
            <p id="tagline" class="text-[10px] font-bold text-white/80 uppercase">Jobs Portal</p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleMode()" class="p-2 bg-black/20 rounded-lg text-white"> <span id="modeIcon">☀️</span> </button>
            <button onclick="toggleLang()" class="p-2 bg-black/20 rounded-lg text-white font-bold text-xs"> <span id="langText">EN</span> </button>
        </div>
    </div>
</header>

<div class="max-w-2xl mx-auto p-6">
    <div class="glass p-2 flex items-center px-4 mb-8 mt-4">
        <input type="text" id="searchInput" placeholder="ابحث هنا..." 
               class="bg-transparent w-full p-3 outline-none font-bold text-center text-white" oninput="doSearch()">
    </div>

    <div id="loader" class="text-center py-20">
        <div class="animate-spin w-10 h-10 border-4 border-[#ff3b3b] border-t-transparent rounded-full mx-auto mb-4"></div>
        <p id="loadingMsg" class="text-xs font-bold opacity-50">Fetching Opportunities...</p>
    </div>

    <div id="offersContainer" class="space-y-6 pb-20"></div>
</div>

<script>
    let allData = [];
    let currentLang = 'ar';
    let isDark = true;

    const translations = {
        ar: { placeholder: "ابحث عن وظيفة...", loading: "جاري جلب الفرص...", apply: "قدّم الآن عبر بوابتنا", details: "التفاصيل:", noResults: "لا توجد نتائج..", tagline: "بوابتك نحو الوظائف" },
        en: { placeholder: "Search for jobs...", loading: "Fetching data...", apply: "Apply via our Portal", details: "Details:", noResults: "No results..", tagline: "Your Gateway to Jobs" }
    };

    function toggleMode() {
        isDark = !isDark;
        document.getElementById("bodyTag").className = isDark ? "dark" : "light";
        document.getElementById("modeIcon").innerText = isDark ? "☀️" : "🌙";
    }

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById("langText").innerText = currentLang === 'ar' ? 'EN' : 'AR';
        document.getElementById("searchInput").placeholder = translations[currentLang].placeholder;
        render(allData);
    }

    function doSearch() {
        const term = document.getElementById("searchInput").value.toLowerCase();
        const filtered = allData.filter(o => (o.name + JSON.stringify(o.details)).toLowerCase().includes(term));
        render(filtered);
    }

    function loadOffers() {
        if (typeof google !== 'undefined') {
            google.script.run.withSuccessHandler(data => {
                allData = data; render(data);
                document.getElementById("loader").style.display = "none";
            }).getOffers();
        }
    }

    function render(data) {
        const container = document.getElementById("offersContainer");
        container.innerHTML = "";
        data.forEach(o => {
            let shortcuts = ""; let fullDetail = "";
            for (let key in o.details) {
                if (key.toLowerCase().includes("details")) { fullDetail = o.details[key]; }
                else { shortcuts += `<div class="detail-item font-bold"><b>${key}:</b> ${o.details[key]}</div>`; }
            }
            container.innerHTML += `
                <div class="glass p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-black text-[#ff3b3b]">${o.name}</h2>
                        <span class="text-[10px] font-bold px-3 py-1 bg-green-500/10 text-green-500 border border-green-500/20 rounded-full">${o.status}</span>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-4">${shortcuts}</div>
                    ${fullDetail ? `<div class="p-4 bg-white/5 rounded-lg text-sm border-r-4 border-[#ff3b3b] mb-4">${fullDetail}</div>` : ''}
                    
                    <a href="https://hussainea.github.io/FireHire/" target="_parent" class="block">
                        <button class="apply-btn w-full py-4 font-black text-white text-lg uppercase">${translations[currentLang].apply}</button>
                    </a>
                </div>`;
        });
    }
    window.onload = loadOffers;
</script>
</body>
</html>
