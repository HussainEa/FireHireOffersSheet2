<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>FireHire Job Offers</title>
<link rel="icon" href="https://i.ibb.co/5Xh4xx8Y/IMG-20251012-WA0004.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #080810;
    overflow: hidden;
    font-family: 'Cairo', sans-serif;
  }

  /* splash screen */
  #splash {
    position: fixed; inset: 0; z-index: 99;
    background: #080810;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  #splash.hidden { opacity: 0; visibility: hidden; }

  .splash-logo {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, #ff3b3b, #ff8c00);
    display: grid; place-items: center;
    font-size: 30px;
    box-shadow: 0 0 40px rgba(255,59,59,0.5), 0 0 80px rgba(255,107,43,0.2);
    animation: logoPop 0.6s cubic-bezier(.25,.8,.25,1) both;
  }
  @keyframes logoPop {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .splash-name {
    font-size: 26px; font-weight: 900; letter-spacing: -0.5px;
    color: #ff3b3b;
    animation: fadeUp 0.5s 0.2s both;
  }

  .splash-ring {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,59,59,0.15);
    border-top-color: #ff3b3b;
    border-radius: 50%;
    animation: spin 0.8s linear infinite, fadeUp 0.5s 0.3s both;
  }
  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes fadeUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* iframe */
  iframe {
    width: 100%; height: 100vh;
    border: none; display: block;
  }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">🔥</div>
  <div class="splash-name">FIREHIRE</div>
  <div class="splash-ring"></div>
</div>

<iframe
  src="https://script.google.com/macros/s/AKfycbyh7d1V-QVvNNI1u2T_IgJHIsVv5oGGvkRCDDSszJv8-mPBdyvplaXNUjRXSaTdpGGZ/exec"
  loading="lazy"
  onload="document.getElementById('splash').classList.add('hidden')"
></iframe>

</body>
</html>
